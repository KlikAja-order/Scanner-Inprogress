<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Inprogress | SLA Scan Station</title>

    <!-- Firebase & Tailwind -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Html5QrCode (ZXing) untuk scanning barcode kecil yang lebih tajam -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <!-- Font Plus Jakarta -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .font-mono-custom {
            font-family: 'JetBrains Mono', monospace;
        }
        body {
            background: #0A0C12;
            background-image: radial-gradient(circle at 30% 10%, rgba(16, 185, 129, 0.05) 0%, transparent 60%);
        }
        /* Glassmorphism Premium */
        .glass-premium {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.4);
        }
        .glass-card {
            background: rgba(15, 19, 28, 0.65);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.2s ease;
        }
        .glass-dark-panel {
            background: rgba(8, 11, 18, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        /* Stat Card */
        .stat-card {
            background: linear-gradient(135deg, rgba(20, 184, 166, 0.1), rgba(20, 184, 166, 0.02));
            border-bottom: 2px solid rgba(20, 184, 166, 0.5);
            transition: all 0.2s;
            cursor: pointer;
        }
        .stat-card:active { transform: scale(0.97); }
        .stat-card.filter-active {
            border-bottom-color: #14b8a6;
            box-shadow: 0 4px 14px -5px rgba(20, 184, 166, 0.5);
            background: rgba(20, 184, 166, 0.12);
        }

        /* FIX SCANNER UI */
        #qr-reader {
            border: none !important;
            background: black !important;
        }
        #qr-reader video {
            object-fit: cover !important;
            width: 100% !important;
            height: 100% !important;
        }
        /* Frame yang sinkron dengan kotak scan */
        .scan-frame-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px; /* Sesuai dengan qrbox */
            height: 260px;
            border: 2px solid #14b8a6;
            border-radius: 24px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
            z-index: 10;
        }
        .scan-line-premium {
            position: absolute;
            left: 10%;
            width: 80%;
            height: 2px;
            background: #14b8a6;
            box-shadow: 0 0 15px #14b8a6;
            animation: scanMove 2s infinite ease-in-out;
            z-index: 11;
        }
        @keyframes scanMove {
            0% { top: 20%; }
            50% { top: 80%; }
            100% { top: 20%; }
        }

        /* Perbaikan Tombol Tulis agar kelihatan */
        .btn-tulis {
            background: rgba(255, 255, 255, 0.9) !important;
            color: #0A0C12 !important;
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(20, 184, 166, 0.3);
        }

        /* Modal Premium */
        .modal-premium {
            background: rgba(10, 13, 20, 0.98);
            backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.92) translateY(25px);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.2);
        }
        .modal-premium.active {
            transform: scale(1) translateY(0);
        }
        .sheet-slide {
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .sheet-slide.active {
            transform: translateY(0);
        }
        .badge-filter {
            background: rgba(20, 184, 166, 0.15);
            border-radius: 40px;
            padding: 3px 10px;
            font-size: 8px;
            font-weight: 800;
            letter-spacing: 0.3px;
        }
        button:active { transform: scale(0.96); transition: transform 0.08s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-track { background: #1e293b; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #14b8a6; border-radius: 10px; }

        .awb-input {
            background: rgba(255,255,255,0.05);
            border-bottom: 2px solid #14b8a6;
            color: #f1f5f9;
            letter-spacing: 1px;
        }
        .awb-input:focus {
            outline: none;
            border-bottom-color: #5eead4;
            background: rgba(255,255,255,0.08);
        }
        .awb-input::placeholder {
            color: #64748b;
            font-size: 12px;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- HEADER PREMIUM -->
    <div class="shrink-0 relative z-30 pt-6 pb-2 px-6 border-b border-white/5 bg-gradient-to-b from-[#0A0C12] to-transparent">
        <div class="flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-extrabold tracking-tighter bg-gradient-to-r from-white via-teal-200 to-teal-400 bg-clip-text text-transparent">INPROGRESS</h1>
                <p class="text-[8px] font-bold text-teal-400/80 tracking-[0.2em] mt-0.5">STAGING · BLHR0</p>
            </div>
            <div class="glass-premium px-3 py-1.5 rounded-full flex items-center gap-2 border border-teal-500/30">
                <span class="w-1.5 h-1.5 bg-teal-500 rounded-full animate-pulse"></span>
                <span class="text-[7px] font-black uppercase tracking-wider text-teal-200">LIVE</span>
            </div>
        </div>
    </div>

    <!-- STATISTIK CARD -->
    <div class="px-5 py-4 grid grid-cols-3 gap-3 shrink-0">
        <div id="stat-total-card" class="stat-card rounded-2xl p-3 text-center glass-dark-panel">
            <p class="text-2xl font-black tracking-tighter text-white" id="total-today">0</p>
            <p class="text-[8px] font-bold text-teal-400/80 uppercase tracking-wider mt-0.5">TOTAL PAKET</p>
        </div>
        <div id="stat-scanned-card" class="stat-card rounded-2xl p-3 text-center glass-dark-panel">
            <p class="text-2xl font-black tracking-tighter text-teal-400" id="scanned-count">0</p>
            <p class="text-[8px] font-bold text-teal-400/80 uppercase tracking-wider mt-0.5">TELAH SCAN</p>
        </div>
        <div id="stat-pending-card" class="stat-card rounded-2xl p-3 text-center glass-dark-panel">
            <p class="text-2xl font-black tracking-tighter text-amber-400" id="pending-count">0</p>
            <p class="text-[8px] font-bold text-amber-400/80 uppercase tracking-wider mt-0.5">BELUM SCAN</p>
        </div>
    </div>

    <!-- ACTIVE FILTERS BAR -->
    <div class="px-5 pb-2 flex items-center justify-between shrink-0">
        <div class="flex flex-wrap gap-2 items-center" id="active-filters-container">
            <span class="text-[8px] font-bold text-slate-500 uppercase tracking-wider">Filter:</span>
            <span id="filter-badge-status" class="badge-filter text-teal-300">Semua status</span>
            <span id="filter-badge-district" class="badge-filter text-teal-300 hidden">Semua kecamatan</span>
        </div>
        <button onclick="resetAllFilters()" class="text-[8px] font-black uppercase tracking-wider text-slate-400 hover:text-white px-2 py-1 rounded-full bg-white/5">Reset</button>
    </div>

    <!-- MAIN LIST -->
    <main class="flex-1 overflow-y-auto px-5 pb-36 custom-scroll">
        <div id="data-list" class="space-y-2.5 mt-2"></div>
    </main>

    <!-- BOTTOM NAVIGASI -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#0A0E1A]/90 backdrop-blur-2xl border-t border-white/10 py-2.5 px-8 flex items-center justify-between z-50 shadow-2xl">
        <button onclick="toggleSheet('district-sheet', true)" class="flex flex-col items-center gap-0.5 text-slate-400 active:text-teal-400 transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
            <span class="text-[7px] font-black uppercase">Filter</span>
        </button>
        
        <button onclick="startScanner()" class="w-16 h-16 bg-gradient-to-br from-teal-500 to-teal-700 rounded-full flex items-center justify-center -translate-y-5 shadow-2xl shadow-teal-500/40 active:scale-95 transition-all duration-150 ring-2 ring-white/20">
            <svg class="w-8 h-8 text-white drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.121 14.121L19 19m-7-7a4 4 0 11-8 0 4 4 0 018 0zM19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2z"></path></svg>
        </button>
        
        <button onclick="secureAdminMenu()" class="flex flex-col items-center gap-0.5 text-slate-400 active:text-teal-400 transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <span class="text-[7px] font-black uppercase">Admin</span>
        </button>
    </nav>

    <!-- SCANNER UI -->
    <div id="scanner-ui" class="fixed inset-0 z-[100] bg-black hidden">
        <div id="qr-reader" style="width: 100%; height: 100%;"></div>
        
        <!-- Frame Overlay -->
        <div class="scan-frame-glow pointer-events-none">
            <div class="scan-line-premium"></div>
        </div>

        <div class="absolute top-10 left-4 right-4 flex justify-between z-[110]">
            <button onclick="stopScanner()" class="w-10 h-10 glass-premium rounded-xl flex items-center justify-center text-white text-lg">✕</button>
            <div class="flex gap-2">
                <button onclick="toggleManualInput(true)" class="btn-tulis px-5 h-10 rounded-xl text-[10px] uppercase tracking-widest">✎ TULIS</button>
                <button id="torch-btn" onclick="toggleTorch()" class="w-10 h-10 glass-premium rounded-xl text-lg flex items-center justify-center">🔦</button>
            </div>
        </div>
        
        <div class="absolute bottom-14 left-0 right-0 text-center z-[110]">
            <p class="text-[9px] font-bold text-teal-400 tracking-[2px] bg-black/60 px-4 py-2 rounded-full inline-block backdrop-blur-md">ARAHKAN KE BARCODE / QR</p>
        </div>
        
        <!-- MANUAL INPUT OVERLAY -->
        <div id="manual-overlay" class="absolute inset-0 bg-[#0A0C12]/98 backdrop-blur-2xl hidden flex-col items-center justify-start pt-32 px-8 z-[120]">
            <div class="w-full max-w-sm">
                <p class="text-[11px] font-black text-teal-400 uppercase tracking-[4px] text-center mb-6">INPUT RESI MANUAL</p>
                <input type="text" id="manual-field" placeholder="Masukkan nomor resi / AWB" class="awb-input w-full bg-white/10 border-b-2 border-teal-500/70 py-4 text-xl font-mono font-bold text-center outline-none tracking-wider text-white rounded-lg px-3">
                <div class="flex gap-4 mt-10 w-full">
                    <button onclick="toggleManualInput(false)" class="flex-1 py-4 glass-premium rounded-xl font-bold text-sm text-white border border-white/10">BATAL</button>
                    <button onclick="processManualEntry()" class="flex-1 py-4 bg-gradient-to-r from-teal-500 to-teal-600 text-white rounded-xl font-black text-sm uppercase shadow-xl">PROSES</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL RESULT -->
    <div id="result-sheet" class="fixed inset-0 z-[130] bg-black/85 hidden flex items-center justify-center p-5" onclick="closeResult()">
        <div id="result-modal" class="w-full max-w-md modal-premium rounded-3xl p-6 border border-white/20" onclick="event.stopPropagation()">
            <div id="res-status-icon" class="w-16 h-16 rounded-2xl mx-auto flex items-center justify-center text-4xl mb-4 shadow-2xl"></div>
            <div class="text-center mb-5">
                <p id="res-status-text" class="text-[9px] font-black uppercase tracking-[3px] text-teal-400/90 mb-2"></p>
                <h2 id="res-awb" class="text-xl font-black font-mono-custom tracking-tighter break-all bg-black/50 inline-block px-4 py-2 rounded-full text-white border border-white/20 shadow-md">-</h2>
            </div>
            <div id="res-content" class="space-y-4 mb-6"></div>
            <button onclick="closeResult()" class="w-full py-4 bg-white text-slate-900 rounded-xl font-black text-[10px] uppercase tracking-wider active:scale-95 transition-all shadow-lg">LANJUTKAN SCAN</button>
        </div>
    </div>

    <!-- FILTER KECAMATAN SHEET -->
    <div id="district-sheet" class="fixed inset-0 z-[110] bg-black/70 hidden" onclick="toggleSheet('district-sheet', false)">
        <div class="absolute bottom-0 left-0 right-0 bg-[#0C1022] rounded-t-3xl p-5 sheet-slide max-h-[85vh] flex flex-col" onclick="event.stopPropagation()">
            <div class="w-12 h-1 bg-white/20 rounded-full mx-auto mb-5 shrink-0"></div>
            <div class="mb-5 shrink-0">
                <h3 class="font-black text-[10px] uppercase tracking-[3px] text-teal-400 mb-3">Filter Status</h3>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setStatusFilter('all')" id="f-all" class="py-3 glass-premium rounded-xl text-[9px] font-black uppercase transition-all">Semua</button>
                    <button onclick="setStatusFilter('scanned')" id="f-scanned" class="py-3 glass-premium rounded-xl text-[9px] font-black uppercase">Sudah Scan</button>
                    <button onclick="setStatusFilter('pending')" id="f-pending" class="py-3 glass-premium rounded-xl text-[9px] font-black uppercase">Belum Scan</button>
                </div>
            </div>
            <div class="flex justify-between items-center mb-2 shrink-0">
                <h3 class="font-black text-[10px] uppercase tracking-[3px] text-teal-400">📍 Kecamatan</h3>
                <button onclick="clearDistrictFilter()" class="text-[8px] font-black text-amber-400/80 bg-amber-500/10 px-2 py-1 rounded-full">Hapus semua</button>
            </div>
            <div id="district-options" class="grid grid-cols-2 gap-2 overflow-y-auto pb-6 no-scrollbar"></div>
            <button onclick="toggleSheet('district-sheet', false)" class="mt-5 w-full py-4 bg-teal-500/10 border border-teal-500/40 text-teal-400 rounded-xl font-black text-[9px] uppercase tracking-widest shrink-0">Terapkan & Tutup</button>
        </div>
    </div>

    <!-- ADMIN SHEET -->
    <div id="admin-sheet" class="fixed inset-0 z-[110] bg-black/70 hidden" onclick="toggleSheet('admin-sheet', false)">
        <div class="absolute bottom-0 left-0 right-0 bg-[#0C1022] rounded-t-3xl p-6 sheet-slide" onclick="event.stopPropagation()">
            <div class="w-12 h-1 bg-white/20 rounded-full mx-auto mb-6"></div>
            <div class="space-y-4">
                <button onclick="document.getElementById('file-upload').click(); toggleSheet('admin-sheet', false);" class="w-full py-5 glass-premium rounded-xl flex items-center justify-center gap-2 font-black text-[10px] uppercase tracking-widest border border-white/10">
                    📂 UPDATE CLOUD (CSV)
                </button>
                <button onclick="resetCloudData()" class="w-full py-5 bg-rose-500/10 text-rose-400 border border-rose-500/30 rounded-xl flex items-center justify-center gap-2 font-black text-[10px] uppercase tracking-widest">
                    🧨 RESET SEMUA DATA
                </button>
            </div>
        </div>
    </div>
    <input type="file" id="file-upload" accept=".csv" class="hidden" onchange="handleFileUpload(event)">

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCXxi0dOc3Otq_bUmUDnaOGiMEuBvTOi44",
            authDomain: "sla-core-scanner.firebaseapp.com",
            databaseURL: "https://sla-core-scanner-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sla-core-scanner",
            storageBucket: "sla-core-scanner.firebasestorage.app",
            messagingSenderId: "378895449978",
            appId: "1:378895449978:web:fb8fee0e13f63cd8f720c3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let allData = [];
        let selectedDistricts = new Set();
        let statusFilter = 'all';
        let html5QrCode = null;
        let isScannerActive = false;
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playAlert(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(3.5, audioCtx.currentTime);
            if(type === 'success') {
                osc.type = 'sine';
                osc.frequency.value = 1350;
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                osc.start(); osc.stop(audioCtx.currentTime + 0.25);
            } else {
                osc.type = 'triangle';
                osc.frequency.value = 220;
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        }
        
        function renderStats() {
            let filtered = [...allData];
            if(selectedDistricts.size > 0) filtered = filtered.filter(item => selectedDistricts.has(item.receiver_district));
            
            const total = filtered.length;
            const scanned = filtered.filter(r => r._scanned).length;
            const pending = total - scanned;
            document.getElementById('total-today').textContent = total;
            document.getElementById('scanned-count').textContent = scanned;
            document.getElementById('pending-count').textContent = pending;
        }
        
        function renderList() {
            let filtered = [...allData];
            if(selectedDistricts.size > 0) filtered = filtered.filter(item => selectedDistricts.has(item.receiver_district));
            if(statusFilter === 'scanned') filtered = filtered.filter(item => item._scanned === true);
            if(statusFilter === 'pending') filtered = filtered.filter(item => !item._scanned);

            const container = document.getElementById('data-list');
            if(filtered.length === 0) {
                container.innerHTML = `<div class="glass-card p-8 rounded-2xl text-center text-slate-400 text-[10px] font-bold border border-dashed border-white/10">📭 Tidak ada data sesuai filter</div>`;
                return;
            }
            container.innerHTML = filtered.map(item => `
                <div class="glass-card p-4 rounded-xl flex justify-between items-center ${item._scanned ? 'border-l-4 border-teal-500' : 'border-l-4 border-slate-700'}">
                    <div>
                        <p class="font-mono-custom text-xs font-black text-white">${item.waybill}</p>
                        <p class="text-[9px] font-semibold text-slate-300 truncate max-w-[180px]">${item.receiver_name || '—'}</p>
                        <span class="text-[8px] font-black text-teal-400/80 uppercase">${item.receiver_district || '-'}</span>
                    </div>
                    <div class="text-right">
                        ${item._scanned ? `<span class="bg-teal-500/20 text-teal-300 px-2 py-1 rounded-full text-[8px] font-black uppercase">✓ TERSEDIA</span>` : `<span class="bg-amber-500/20 text-amber-300 px-2 py-1 rounded-full text-[8px] font-black uppercase">⚠ BELUM</span>`}
                    </div>
                </div>
            `).join('');
        }
        
        function renderDistricts() {
            const dists = [...new Set(allData.map(r => r.receiver_district).filter(Boolean))].sort();
            const container = document.getElementById('district-options');
            if(!container) return;
            container.innerHTML = dists.map(d => `
                <div onclick="toggleDistrict('${d.replace(/'/g, "\\'")}')" 
                     class="p-3 glass-premium rounded-xl text-center text-[9px] font-black uppercase cursor-pointer transition-all ${selectedDistricts.has(d) ? 'bg-teal-500 text-black border-teal-300' : 'text-slate-300 border-white/5'}">
                    ${d}
                </div>
            `).join('');
        }
        
        window.toggleDistrict = function(d) {
            if(selectedDistricts.has(d)) selectedDistricts.delete(d);
            else selectedDistricts.add(d);
            updateAllUI();
        };

        function updateAllUI() {
            renderStats(); renderList(); renderDistricts();
            const statusBadge = document.getElementById('filter-badge-status');
            statusBadge.textContent = statusFilter === 'all' ? 'Semua status' : (statusFilter === 'scanned' ? 'Sudah scan' : 'Belum scan');
            const districtBadge = document.getElementById('filter-badge-district');
            if(selectedDistricts.size === 0) districtBadge.classList.add('hidden');
            else { districtBadge.classList.remove('hidden'); districtBadge.textContent = `${selectedDistricts.size} kecamatan`; }
        }

        function setStatusFilter(filter) {
            statusFilter = filter;
            ['all','scanned','pending'].forEach(f => {
                const btn = document.getElementById(`f-${f}`);
                if(btn) btn.className = statusFilter === f ? "py-3 bg-teal-500 text-black rounded-xl text-[9px] font-black uppercase" : "py-3 glass-premium rounded-xl text-[9px] font-black uppercase";
            });
            updateAllUI();
        }

        function resetAllFilters() {
            selectedDistricts.clear(); statusFilter = 'all'; setStatusFilter('all');
        }

        // SCANNER LOGIC FIX
        async function startScanner() {
            const scannerUi = document.getElementById('scanner-ui');
            scannerUi.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("qr-reader");
            }
            
            const config = {
                fps: 20,
                qrbox: { width: 260, height: 260 },
                aspectRatio: 1.0
            };
            
            try {
                await html5QrCode.start(
                    { facingMode: "environment" },
                    config,
                    (decodedText) => { if (isScannerActive) handleProcess(decodedText); },
                    () => {} 
                );
                isScannerActive = true;
            } catch (err) {
                console.error("Kamera Error:", err);
            }
        }
        
        async function stopScanner() {
            isScannerActive = false;
            if (html5QrCode) {
                try {
                    await html5QrCode.stop();
                } catch(e) {}
            }
            document.getElementById('scanner-ui').classList.add('hidden');
            document.body.style.overflow = '';
        }

        function handleProcess(code) {
            isScannerActive = false;
            const match = allData.find(r => r.waybill === code);
            if (match) {
                db.ref(`logistic_data/${match.fbKey}`).update({ _scanned: true });
                playAlert('success');
                showResult(true, match);
            } else {
                playAlert('error');
                showResult(false, { waybill: code });
            }
        }
        
        function showResult(success, data) {
            const modal = document.getElementById('result-modal');
            const iconDiv = document.getElementById('res-status-icon');
            if(success) {
                iconDiv.className = "w-16 h-16 rounded-2xl mx-auto flex items-center justify-center text-4xl mb-4 bg-teal-500 text-black shadow-xl";
                iconDiv.textContent = '✓';
                document.getElementById('res-status-text').textContent = 'INPROGRESS • PAKET DITEMUKAN';
                document.getElementById('res-content').innerHTML = `
                    <div class="space-y-3">
                        <div class="glass-card p-3 rounded-xl">
                            <p class="text-[8px] font-black text-teal-400/80 uppercase tracking-wider">Penerima</p>
                            <p class="text-sm font-bold text-white">${data.receiver_name || '-'}</p>
                        </div>
                        <div class="glass-card p-3 rounded-xl">
                            <p class="text-[8px] font-black text-teal-400/80 uppercase tracking-wider">Kecamatan</p>
                            <p class="text-xs font-black text-teal-400 mt-1">${data.receiver_district || '-'}</p>
                        </div>
                    </div>`;
            } else {
                iconDiv.className = "w-16 h-16 rounded-2xl mx-auto flex items-center justify-center text-4xl mb-4 bg-rose-500 text-black shadow-xl";
                iconDiv.textContent = '✕';
                document.getElementById('res-status-text').textContent = 'PAKET TIDAK TERDAFTAR';
                document.getElementById('res-content').innerHTML = `<p class="text-[10px] text-slate-400 text-center">Resi tidak ditemukan di database staging.</p>`;
            }
            document.getElementById('res-awb').textContent = data.waybill;
            document.getElementById('result-sheet').classList.remove('hidden');
            setTimeout(() => modal.classList.add('active'), 50);
        }
        
        function closeResult() {
            document.getElementById('result-modal').classList.remove('active');
            setTimeout(() => {
                document.getElementById('result-sheet').classList.add('hidden');
                // Otomatis aktifkan scanner lagi setelah modal tutup
                isScannerActive = true;
            }, 300);
        }
        
        function toggleManualInput(show) {
            const overlay = document.getElementById('manual-overlay');
            overlay.classList.toggle('hidden', !show);
            if(show) {
                isScannerActive = false;
                setTimeout(() => document.getElementById('manual-field').focus(), 100);
            } else {
                isScannerActive = true;
            }
        }

        function processManualEntry() {
            const val = document.getElementById('manual-field').value.trim();
            if(val) { 
                handleProcess(val); 
                document.getElementById('manual-field').value = '';
                toggleManualInput(false);
            }
        }

        async function toggleTorch() {
            if (html5QrCode && isScannerActive) {
                try {
                    const track = html5QrCode.getRunningTrackCameraCapabilities();
                    if (track.torch) {
                        const current = html5QrCode.getRunningTrackCameraSettings().torch;
                        await html5QrCode.applyVideoConstraints({ advanced: [{ torch: !current }] });
                    }
                } catch(e) {}
            }
        }

        function toggleSheet(id, show) {
            const el = document.getElementById(id);
            if(show) {
                el.classList.remove('hidden');
                setTimeout(() => el.querySelector('.sheet-slide').classList.add('active'), 10);
            } else {
                const sheet = el.querySelector('.sheet-slide');
                sheet.classList.remove('active');
                setTimeout(() => el.classList.add('hidden'), 350);
            }
        }

        function secureAdminMenu() { 
            if(prompt("🔐 PIN ADMIN:") === "8989") toggleSheet('admin-sheet', true); 
        }

        db.ref('logistic_data').on('value', snap => {
            const val = snap.val();
            allData = val ? Object.keys(val).map(k => ({ fbKey: k, ...val[k] })) : [];
            updateAllUI();
        });

        async function handleFileUpload(e) {
            const file = e.target.files[0];
            if(!file) return;
            const text = await file.text();
            const lines = text.trim().split('\n');
            const headers = lines[0].split('|').map(h => h.trim());
            const newData = {};
            lines.slice(1).forEach(line => {
                const parts = line.split('|');
                let obj = {};
                headers.forEach((h, idx) => { obj[h] = parts[idx]?.trim() || ''; });
                obj._scanned = false;
                if(obj.waybill) newData[obj.waybill] = obj;
            });
            await db.ref('logistic_data').set(newData);
            alert("Upload Berhasil");
        }
    </script>
</body>
</html>
