<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Delivery BLHR0 - Professional Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root { 
            --primary: #e11d48; 
            --primary-dark: #be123c;
            --dark-bg: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.75);
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b2e 100%);
            color: #f8fafc; 
            margin-bottom: 80px;
            min-height: 100vh;
        }
        
        .glass-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 1.5rem; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
        }
        
        .glass-card:active {
            transform: scale(0.98);
        }
        
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            height: 75px; 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(20px); 
            border-top: 1px solid rgba(255, 255, 255, 0.1); 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .nav-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-size: 0.7rem; 
            color: #94a3b8; 
            transition: 0.2s; 
            background: none; 
            border: none; 
            cursor: pointer;
            font-weight: 500;
            gap: 4px;
        }
        
        .nav-item i { font-size: 1.4rem; transition: 0.2s; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active i { transform: translateY(-2px); }
        
        #video-container { 
            width: 100%; 
            max-width: 400px; 
            margin: 0 auto; 
            border-radius: 1.2rem; 
            overflow: hidden; 
            background: #000; 
            position: relative; 
            aspect-ratio: 4/3;
        }
        
        #qr-video { width: 100%; height: 100%; object-fit: cover; }
        .scan-overlay { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 80%; 
            height: 40%; 
            border: 2px solid var(--primary); 
            border-radius: 20px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.6);
            pointer-events: none; 
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { border-color: var(--primary); opacity: 1; transform: translate(-50%, -50%) scale(1); }
            50% { border-color: #f43f5e; opacity: 0.7; transform: translate(-50%, -50%) scale(1.02); }
            100% { border-color: var(--primary); opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        
        .status-badge { padding: 4px 12px; border-radius: 99px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.3px; }
        .status-pending { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; }
        .status-success { background: linear-gradient(135deg, #10b981, #059669); color: #fff; }
        
        .hidden { display: none; }
        
        #loading-overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(8px);
            z-index: 3000; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        
        input, textarea, select { transition: all 0.2s; }
        input:focus, textarea:focus, select:focus { transform: translateY(-1px); }
        
        .toast-notif {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 2000;
            border-left: 3px solid var(--primary);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            pointer-events: none;
            animation: fadeInUp 0.3s ease;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .detail-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 1500;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .slot-card {
            background: rgba(51, 65, 85, 0.5);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .stat-clickable {
            cursor: pointer;
            transition: all 0.2s;
        }
        .stat-clickable:active {
            transform: scale(0.95);
        }
        
        .gallery-img {
            cursor: pointer;
            transition: transform 0.2s;
        }
        .gallery-img:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-rose-500 mb-4"></div>
        <p class="text-sm font-bold tracking-wide">SINKRONISASI CLOUD...</p>
    </div>

    <header class="p-5 pb-2">
        <div class="flex justify-between items-center mb-5">
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-white to-rose-400 bg-clip-text text-transparent">Delivery <span class="text-rose-500">BLHR0</span></h1>
                <p class="text-[10px] text-slate-400 mt-1">Firebase Cloud Edition</p>
            </div>
            <div class="text-[9px] bg-emerald-500/15 text-emerald-400 border border-emerald-500/30 px-3 py-1.5 rounded-full uppercase font-bold flex items-center gap-1">
                <i class="fas fa-cloud-upload-alt text-[10px]"></i> Cloud Sync
            </div>
        </div>
        
        <div class="grid grid-cols-3 gap-3">
            <div class="glass-card p-3 text-center stat-clickable" onclick="filterByStatus('all')">
                <p class="text-slate-400 text-[11px] font-medium"><i class="fas fa-boxes mr-1"></i> Total</p>
                <p class="text-2xl font-black" id="stat-total">0</p>
            </div>
            <div class="glass-card p-3 text-center stat-clickable" onclick="filterByStatus('BELUM TERKIRIM')">
                <p class="text-slate-400 text-[11px] font-medium"><i class="fas fa-clock mr-1"></i> Pending</p>
                <p class="text-2xl font-black text-amber-500" id="stat-pending">0</p>
            </div>
            <div class="glass-card p-3 text-center stat-clickable" onclick="filterByStatus('TERKIRIM')">
                <p class="text-slate-400 text-[11px] font-medium"><i class="fas fa-check-circle mr-1"></i> Terkirim</p>
                <p class="text-2xl font-black text-emerald-500" id="stat-done">0</p>
            </div>
        </div>
    </header>

    <main id="page-dashboard" class="px-5 pb-20 space-y-6">
        <section class="glass-card p-4">
            <div class="flex items-center justify-between mb-4">
                <h2 class="font-bold text-base"><i class="fas fa-camera mr-2 text-rose-500"></i>Scanner AWB</h2>
                <button onclick="toggleScanner()" id="btn-scan" class="bg-rose-500 hover:bg-rose-600 active:scale-95 transition text-white px-5 py-2 rounded-full text-sm font-semibold shadow-lg shadow-rose-500/30"><i class="fas fa-camera-retro mr-1"></i> Aktifkan</button>
            </div>
            <div id="scanner-ui" class="hidden">
                <div id="video-container" class="mb-4">
                    <video id="qr-video" playsinline></video>
                    <div class="scan-overlay"></div>
                </div>
                <p class="text-center text-[11px] text-slate-400 mb-3"><i class="fas fa-qrcode"></i> Arahkan ke barcode AWB</p>
                <div class="relative mt-2">
                    <i class="fas fa-pen-alt absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="text" id="manual-resi-input" placeholder="Input Resi Manual..." class="w-full bg-slate-800/80 border border-slate-700 rounded-xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:border-rose-500">
                    <button onclick="searchManualResi()" class="absolute right-2 top-1/2 -translate-y-1/2 bg-rose-500 text-white px-3 py-1 rounded-lg text-xs font-bold"><i class="fas fa-search"></i> Cari</button>
                </div>
            </div>
            <div class="relative mt-3">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                <input type="text" id="search-awb" placeholder="Cari No. Resi / Nama..." class="w-full bg-slate-800/80 border border-slate-700 rounded-xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:border-rose-500 focus:ring-1 focus:ring-rose-500" oninput="filterDeliveries()">
            </div>
        </section>

        <section>
            <div class="flex items-center justify-between mb-4">
                <h2 class="font-bold text-base"><i class="fas fa-list-ul mr-2 text-rose-500"></i>Daftar Pengiriman</h2>
                <select id="filter-status" onchange="filterDeliveries()" class="bg-slate-800/80 text-xs rounded-xl px-3 py-2 border border-slate-700 font-semibold uppercase tracking-wider">
                    <option value="all"><i class="fas fa-globe"></i> Semua</option>
                    <option value="BELUM TERKIRIM"><i class="fas fa-clock"></i> Pending</option>
                    <option value="TERKIRIM"><i class="fas fa-check-circle"></i> Terkirim</option>
                </select>
            </div>
            <div id="delivery-list" class="space-y-3 pb-10"></div>
        </section>
        
        <button onclick="sendReportToLeader()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:shadow-lg transition py-4 rounded-xl font-extrabold uppercase tracking-wider text-sm shadow-lg shadow-blue-500/20">
            <i class="fas fa-chart-line mr-2"></i> Laporan Data Terkirim ke Leader
        </button>
    </main>

    <main id="page-input" class="px-5 space-y-6 hidden pb-24">
        <div id="password-screen">
            <section class="glass-card p-6">
                <h2 class="font-bold text-lg mb-4 text-center"><i class="fas fa-lock mr-2 text-rose-500"></i>Verifikasi Akses</h2>
                <input type="password" id="access-password" placeholder="Masukkan Sandi" class="w-full bg-slate-800/80 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-rose-500 mb-4 text-center text-lg tracking-widest">
                <button onclick="verifyPassword()" class="w-full bg-rose-500 hover:bg-rose-600 transition py-3 rounded-xl font-bold"><i class="fas fa-key mr-2"></i> Masuk</button>
            </section>
        </div>
        
        <div id="input-content" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-lg"><i class="fas fa-layer-group mr-2 text-rose-500"></i>Multi Slots Input</h2>
                <button onclick="addNewSlot()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm font-bold"><i class="fas fa-plus mr-1"></i> Tambah Slot</button>
            </div>
            
            <div id="slots-container" class="space-y-4"></div>
            
            <button onclick="syncAllSlotsToCloud()" class="w-full bg-gradient-to-r from-rose-500 to-rose-600 hover:shadow-lg transition py-4 rounded-xl font-extrabold uppercase tracking-wider text-sm shadow-lg shadow-rose-500/20">
                <i class="fas fa-cloud-upload-alt mr-2"></i> Sinkronkan Semua Slot ke Cloud
            </button>
            
            <button onclick="resetCloudDatabase()" class="w-full bg-red-600/30 hover:bg-red-600/50 transition py-3 rounded-xl font-bold text-sm text-red-300">
                <i class="fas fa-trash-alt mr-2"></i> Hapus Semua Data Cloud
            </button>
        </div>
    </main>

    <!-- Galeri Bukti Foto -->
    <div id="gallery-modal" class="fixed inset-0 bg-black/95 z-[2500] hidden flex flex-col">
        <div class="flex justify-between items-center p-4 bg-black/80 border-b border-white/10">
            <h3 class="font-bold text-lg"><i class="fas fa-images text-rose-500 mr-2"></i>Galeri Bukti Foto</h3>
            <button onclick="closeGallery()" class="text-white text-2xl w-10 h-10 rounded-full bg-white/10"><i class="fas fa-times"></i></button>
        </div>
        <div id="gallery-content" class="flex-1 overflow-y-auto p-4">
            <div id="gallery-list" class="grid grid-cols-2 gap-4"></div>
        </div>
        <div class="p-4 bg-black/80 border-t border-white/10 flex gap-3">
            <input type="password" id="admin-pin-reset" placeholder="PIN Admin (9090)" class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-center">
            <button onclick="resetAllProofPhotos()" class="bg-red-600 hover:bg-red-700 px-6 rounded-xl font-bold"><i class="fas fa-trash-alt mr-2"></i> Reset Semua Bukti</button>
        </div>
    </div>

    <div id="modal-camera" class="fixed inset-0 bg-black/95 z-[2000] hidden flex flex-col">
        <video id="photo-video" class="flex-1 object-cover" autoplay playsinline></video>
        <div class="p-6 bg-black/80 backdrop-blur flex justify-between items-center">
            <button onclick="closeCameraModal()" class="text-white text-2xl w-12 h-12 rounded-full bg-white/10"><i class="fas fa-times"></i></button>
            <button onclick="takeSnapshotCloud()" class="w-20 h-20 bg-white rounded-full border-4 border-slate-500 flex items-center justify-center shadow-2xl active:scale-95 transition">
                <div class="w-16 h-16 bg-gradient-to-r from-rose-500 to-pink-500 rounded-full flex items-center justify-center text-white text-2xl"><i class="fas fa-camera"></i></div>
            </button>
            <div class="w-12"></div>
        </div>
        <canvas id="canvas-photo" class="hidden"></canvas>
    </div>

    <nav class="bottom-nav">
        <button onclick="showPage('dashboard')" class="nav-item active" id="nav-dashboard">
            <i class="fas fa-truck"></i>
            <span>Dashboard</span>
        </button>
        <button onclick="showPage('input')" class="nav-item" id="nav-input">
            <i class="fas fa-cloud-upload-alt"></i>
            <span>Input Cloud</span>
        </button>
        <button onclick="openGallery()" class="nav-item" id="nav-gallery">
            <i class="fas fa-images"></i>
            <span>Bukti Foto</span>
        </button>
    </nav>

    <script>
        // ============ FIREBASE KONFIGURASI ============
        const firebaseConfig = {
            apiKey: "AIzaSyDV6QRWe0hulQBnHDqlBxRpwtrUyjKj60Y",
            authDomain: "delivery-blhr0.firebaseapp.com",
            projectId: "delivery-blhr0",
            databaseURL: "https://delivery-blhr0-default-rtdb.asia-southeast1.firebasedatabase.app",
            storageBucket: "delivery-blhr0.firebasestorage.app",
            messagingSenderId: "294262130067",
            appId: "1:294262130067:web:93ed1b36b8ac6230e01466"
        };

        firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database().ref('deliveries');

        let deliveries = [];
        let currentScanningAwb = null;
        let scanStream = null;
        let currentFilterStatus = 'all';
        
        let textSlots = ['', '', ''];

        dbRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                deliveries = Object.values(data);
            } else {
                deliveries = [];
            }
            updateStats();
            filterDeliveries();
        });

        function updateStats() {
            document.getElementById('stat-total').innerText = deliveries.length;
            document.getElementById('stat-pending').innerText = deliveries.filter(d => d.status === 'BELUM TERKIRIM').length;
            document.getElementById('stat-done').innerText = deliveries.filter(d => d.status === 'TERKIRIM').length;
        }

        function filterByStatus(status) {
            const filterSelect = document.getElementById('filter-status');
            if(status === 'all') filterSelect.value = 'all';
            else if(status === 'BELUM TERKIRIM') filterSelect.value = 'BELUM TERKIRIM';
            else if(status === 'TERKIRIM') filterSelect.value = 'TERKIRIM';
            filterDeliveries();
        }

        function showToast(message, isSuccess = true) {
            const toast = document.createElement('div');
            toast.className = 'toast-notif';
            toast.innerHTML = `<i class="fas ${isSuccess ? 'fa-check-circle text-emerald-500' : 'fa-exclamation-triangle text-amber-500'} mr-2"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function showLoading(show) {
            document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
        }

        function parseTextToDeliveries(rawText) {
            const results = [];
            const blocks = rawText.split(/(?=Hallo\s+)/i);
            
            for(let block of blocks) {
                if(!block.trim()) continue;
                
                let name = 'Unknown';
                const nameMatch = block.match(/Hallo\s+([^:]+):?/i);
                if(nameMatch) name = nameMatch[1].trim();
                
                let awb = '';
                const awbMatch = block.match(/AWB\s*:\s*(\d+)/i);
                if(awbMatch) awb = awbMatch[1].trim();
                if(!awb) continue;
                
                let cod = 'NON COD';
                const codMatch = block.match(/Total\s*:\s*Rp\s*([\d.]+)/i);
                if(codMatch) cod = `Rp ${codMatch[1].trim()}`;
                
                let wa = '';
                const waMatch = block.match(/\+62[\s\d\-]+/);
                if(waMatch) wa = waMatch[0].replace(/[\s-]/g, '');
                
                results.push({
                    awb: awb,
                    name: name,
                    cod: cod,
                    wa: wa || '',
                    status: 'BELUM TERKIRIM',
                    photo: null,
                    timestamp: null
                });
            }
            return results;
        }

        function renderSlots() {
            const container = document.getElementById('slots-container');
            if(!container) return;
            container.innerHTML = '';
            textSlots.forEach((slot, index) => {
                const slotDiv = document.createElement('div');
                slotDiv.className = 'slot-card';
                slotDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold text-rose-400"><i class="fas fa-file-alt mr-1"></i> Slot ${index + 1}</span>
                        ${textSlots.length > 1 ? `<button onclick="removeSlot(${index})" class="text-red-400 text-xs"><i class="fas fa-trash"></i> Hapus</button>` : ''}
                    </div>
                    <textarea class="slot-textarea w-full bg-slate-800/80 border border-slate-700 rounded-xl p-3 text-sm focus:outline-none focus:border-rose-500 font-mono" rows="4" placeholder="Tempel gumpalan text WhatsApp disini...">${escapeHtmlForTextarea(slot)}</textarea>
                `;
                container.appendChild(slotDiv);
            });
            
            document.querySelectorAll('.slot-textarea').forEach((textarea, idx) => {
                textarea.value = textSlots[idx] || '';
                textarea.oninput = (e) => { textSlots[idx] = e.target.value; };
            });
        }
        
        function escapeHtmlForTextarea(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
        
        function addNewSlot() {
            textSlots.push('');
            renderSlots();
            showToast("Slot baru ditambahkan", true);
        }
        
        function removeSlot(index) {
            if(textSlots.length <= 1) {
                showToast("Minimal 1 slot diperlukan", false);
                return;
            }
            textSlots.splice(index, 1);
            renderSlots();
            showToast("Slot dihapus", true);
        }
        
        async function syncAllSlotsToCloud() {
            let allText = '';
            for(let i = 0; i < textSlots.length; i++) {
                if(textSlots[i] && textSlots[i].trim()) {
                    allText += textSlots[i] + '\n\n';
                }
            }
            
            if(!allText.trim()) {
                showToast("Tidak ada data di slot manapun!", false);
                return;
            }
            
            showLoading(true);
            const newDeliveries = parseTextToDeliveries(allText);
            if(newDeliveries.length === 0) {
                showLoading(false);
                showToast("Tidak ada data valid (AWB tidak ditemukan)", false);
                return;
            }
            
            let added = 0;
            for(let item of newDeliveries) {
                const snapshot = await dbRef.child(item.awb).once('value');
                if(!snapshot.exists()) {
                    await dbRef.child(item.awb).set(item);
                    added++;
                }
            }
            
            textSlots = textSlots.map(() => '');
            renderSlots();
            showLoading(false);
            showToast(`✅ ${added} paket berhasil disinkronkan ke Cloud`, true);
            showPage('dashboard');
        }
        
        function verifyPassword() {
            const pwd = document.getElementById('access-password').value;
            if(pwd === '8989') {
                document.getElementById('password-screen').classList.add('hidden');
                document.getElementById('input-content').classList.remove('hidden');
                renderSlots();
                showToast("Akses diberikan", true);
            } else {
                showToast("Sandi salah! Akses ditolak", false);
                document.getElementById('access-password').value = '';
            }
        }
        
        async function resetCloudDatabase() {
            if(confirm("⚠️ HAPUS PERMANEN semua data dari Cloud? Tindakan ini tidak bisa dibatalkan!")) {
                showLoading(true);
                await dbRef.remove();
                showLoading(false);
                showToast("Semua data cloud telah dihapus", true);
            }
        }

        function filterDeliveries() {
            const filter = document.getElementById('filter-status').value;
            currentFilterStatus = filter;
            const searchQuery = document.getElementById('search-awb')?.value.toLowerCase() || '';
            
            let filtered = deliveries.filter(d => {
                const matchStatus = filter === 'all' || d.status === filter;
                const matchSearch = d.awb.includes(searchQuery) || d.name.toLowerCase().includes(searchQuery);
                return matchStatus && matchSearch;
            });
            
            filtered.sort((a,b) => {
                if(a.status === 'BELUM TERKIRIM' && b.status === 'TERKIRIM') return -1;
                if(a.status === 'TERKIRIM' && b.status === 'BELUM TERKIRIM') return 1;
                return 0;
            });
            
            renderDeliveryList(filtered);
        }

        function renderDeliveryList(items) {
            const container = document.getElementById('delivery-list');
            if(!container) return;
            
            if(items.length === 0) {
                container.innerHTML = `<div class="glass-card p-8 text-center text-slate-400"><i class="fas fa-box-open text-3xl mb-2 block"></i> Tidak ada data</div>`;
                return;
            }
            
            container.innerHTML = '';
            items.forEach(item => {
                const isDone = item.status === 'TERKIRIM';
                const div = document.createElement('div');
                div.className = `glass-card p-4 transition-all duration-200 ${isDone ? 'opacity-70' : 'hover:border-rose-500/30'}`;
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex-1">
                            <h3 class="font-bold text-base truncate">${escapeHtml(item.name)}</h3>
                            <p class="text-rose-400 font-mono font-bold text-xs tracking-wider mt-1"><i class="fas fa-barcode mr-1"></i> ${item.awb}</p>
                            <div class="flex gap-3 mt-2 text-[11px]">
                                <span class="text-emerald-400"><i class="fas fa-money-bill-wave mr-1"></i> ${item.cod}</span>
                                ${item.wa ? `<span class="text-slate-400"><i class="fab fa-whatsapp mr-1"></i> ${item.wa.slice(-8)}</span>` : '<span class="text-slate-500"><i class="fas fa-phone-slash mr-1"></i> No WA</span>'}
                            </div>
                        </div>
                        <span class="status-badge ${isDone ? 'status-success' : 'status-pending'} text-[10px]"><i class="fas ${isDone ? 'fa-check-circle' : 'fa-hourglass-half'} mr-1"></i> ${item.status}</span>
                    </div>
                    <div class="flex gap-2 mt-2">
                        <button onclick="showDetail('${item.awb}')" class="flex-1 bg-slate-700/50 hover:bg-slate-700 transition py-2.5 rounded-xl text-xs font-bold"><i class="fas fa-info-circle mr-1"></i> Detail</button>
                        ${item.wa ? `<button onclick="chatBuyer('${item.awb}')" class="flex-1 bg-emerald-600/30 hover:bg-emerald-600/50 transition py-2.5 rounded-xl text-xs font-bold"><i class="fab fa-whatsapp mr-1"></i> Chat</button>` : ''}
                        ${!isDone ? `<button onclick="startDeliveryCloud('${item.awb}')" class="flex-[1.5] bg-rose-500 hover:bg-rose-600 active:scale-95 transition py-2.5 rounded-xl text-xs font-bold shadow"><i class="fas fa-camera-retro mr-1"></i> Selesaikan</button>` : `<button onclick="viewSingleProof('${item.awb}')" class="flex-1 bg-slate-600/50 hover:bg-slate-600 transition py-2.5 rounded-xl text-xs font-bold"><i class="fas fa-image mr-1"></i> Lihat Bukti</button>`}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }

        function showDetail(awb) {
            const item = deliveries.find(d => d.awb === awb);
            if(!item) return;
            const modalDiv = document.createElement('div');
            modalDiv.className = 'detail-modal';
            modalDiv.innerHTML = `
                <div class="glass-card p-6 max-w-sm w-full mx-4">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-xl"><i class="fas fa-info-circle text-rose-500 mr-2"></i>Detail Paket</h3>
                        <button onclick="this.closest('.detail-modal').remove()" class="text-slate-400 text-2xl">&times;</button>
                    </div>
                    <div class="space-y-3 text-sm">
                        <div><span class="text-slate-400"><i class="fas fa-user mr-1"></i> Nama:</span> <span class="font-semibold">${escapeHtml(item.name)}</span></div>
                        <div><span class="text-slate-400"><i class="fas fa-barcode mr-1"></i> AWB:</span> <span class="font-mono text-rose-400">${item.awb}</span></div>
                        <div><span class="text-slate-400"><i class="fas fa-money-bill-wave mr-1"></i> Total COD:</span> <span class="text-emerald-400">${item.cod}</span></div>
                        <div><span class="text-slate-400"><i class="fab fa-whatsapp mr-1"></i> Nomor WA:</span> <span>${item.wa || '-'}</span></div>
                        <div><span class="text-slate-400"><i class="fas fa-tag mr-1"></i> Status:</span> <span class="status-badge ${item.status === 'TERKIRIM' ? 'status-success' : 'status-pending'} text-[10px]">${item.status}</span></div>
                        ${item.timestamp ? `<div><span class="text-slate-400"><i class="fas fa-calendar-alt mr-1"></i> Waktu Kirim:</span> <span>${item.timestamp}</span></div>` : ''}
                    </div>
                    <button onclick="this.closest('.detail-modal').remove()" class="w-full mt-5 bg-rose-500 py-2 rounded-xl text-sm font-bold">Tutup</button>
                </div>
            `;
            document.body.appendChild(modalDiv);
        }

        function chatBuyer(awb) {
            const item = deliveries.find(d => d.awb === awb);
            if(!item || !item.wa) {
                showToast("Nomor WhatsApp tidak tersedia", false);
                return;
            }
            const codText = item.cod !== 'NON COD' ? `COD : ${item.cod}` : 'COD : (Tidak ada / NON COD)';
            const msg = `Halo, ${item.name}.\n\nSaya kurir dari ekspedisi Anteraja sedang perjalanan mengantarkan paket dengan detail :\n\n*No. AWB* ${item.awb}\n${codText}\n\nMohon dibantu share lokasi, foto rumah, serta ancer-ancer/patokan rumahnya dengan detail, agar saya bisa segera melakukan Delivery 🙏\n\n\nTerimakasih`;
            window.open(`https://wa.me/${item.wa.replace(/[^0-9]/g, '')}?text=${encodeURIComponent(msg)}`);
        }

        function sendReportToLeader() {
            const deliveredItems = deliveries.filter(d => d.status === 'TERKIRIM');
            if(deliveredItems.length === 0) {
                showToast("Belum ada paket yang terkirim", false);
                return;
            }
            
            let reportText = "📊 *LAPORAN DELIVERY SUKSES* 📊\n\n";
            reportText += `Total Terkirim: ${deliveredItems.length} paket\n`;
            reportText += `Waktu: ${new Date().toLocaleString('id-ID')}\n`;
            reportText += "═".repeat(30) + "\n\n";
            
            deliveredItems.forEach((item, idx) => {
                reportText += `${idx+1}. 📦 *RESI:* ${item.awb}\n`;
                reportText += `   👤 *Nama:* ${item.name}\n`;
                reportText += `   💰 *COD:* ${item.cod}\n`;
                reportText += `   📞 *HP:* ${item.wa || '-'}\n`;
                if(item.timestamp) reportText += `   🕒 *Terkirim:* ${item.timestamp}\n`;
                reportText += "\n";
            });
            
            const leaderNumber = "6282260082013";
            window.open(`https://wa.me/${leaderNumber}?text=${encodeURIComponent(reportText)}`);
            showToast("Laporan dikirim ke Leader", true);
        }

        // ============ GALERI BUKTI FOTO ============
        function openGallery() {
            const deliveredWithPhoto = deliveries.filter(d => d.status === 'TERKIRIM' && d.photo);
            if(deliveredWithPhoto.length === 0) {
                showToast("Belum ada bukti foto yang tersedia", false);
                return;
            }
            
            const galleryContainer = document.getElementById('gallery-list');
            galleryContainer.innerHTML = '';
            
            deliveredWithPhoto.forEach((item, idx) => {
                const photoDiv = document.createElement('div');
                photoDiv.className = 'glass-card p-2';
                photoDiv.innerHTML = `
                    <img src="${item.photo}" class="gallery-img w-full h-40 object-cover rounded-lg mb-2" onclick="viewFullImage('${item.photo}')">
                    <div class="text-[10px] text-slate-400 p-1">
                        <p><i class="fas fa-barcode mr-1"></i> ${item.awb}</p>
                        <p><i class="fas fa-user mr-1"></i> ${item.name.substring(0, 20)}</p>
                        <button onclick="downloadPhoto('${item.awb}')" class="mt-1 w-full bg-emerald-600/30 py-1 rounded text-xs"><i class="fas fa-download mr-1"></i> Download</button>
                    </div>
                `;
                galleryContainer.appendChild(photoDiv);
            });
            
            document.getElementById('gallery-modal').classList.remove('hidden');
        }
        
        function closeGallery() {
            document.getElementById('gallery-modal').classList.add('hidden');
            document.getElementById('admin-pin-reset').value = '';
        }
        
        function viewFullImage(photoUrl) {
            const win = window.open("");
            win.document.write(`<body style="background:#0f172a;margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;"><img src="${photoUrl}" style="max-width:95%;max-height:95vh;border-radius:24px;border:2px solid #e11d48;"></body>`);
        }
        
        function downloadPhoto(awb) {
            const item = deliveries.find(d => d.awb === awb);
            if(!item || !item.photo) return;
            const link = document.createElement('a');
            link.href = item.photo;
            link.download = `bukti_${awb}.jpg`;
            link.click();
            showToast("Foto sedang diunduh", true);
        }
        
        function viewSingleProof(awb) {
            const item = deliveries.find(d => d.awb === awb);
            if(!item || !item.photo) {
                showToast("Foto bukti tidak tersedia", false);
                return;
            }
            viewFullImage(item.photo);
        }
        
        async function resetAllProofPhotos() {
            const pin = document.getElementById('admin-pin-reset').value;
            if(pin !== '9090') {
                showToast("PIN Admin salah! Reset dibatalkan", false);
                return;
            }
            
            if(!confirm("⚠️ RESET SEMUA BUKTI FOTO? Data foto akan dihapus permanen dari cloud! Status terkirim tetap tersimpan.")) return;
            
            showLoading(true);
            const updates = {};
            deliveries.forEach(item => {
                if(item.status === 'TERKIRIM' && item.photo) {
                    updates[`${item.awb}/photo`] = null;
                }
            });
            
            await dbRef.update(updates);
            showLoading(false);
            showToast("Semua bukti foto telah direset (hanya admin)", true);
            closeGallery();
        }

        // ============ SCANNER ============
        async function toggleScanner() {
            const ui = document.getElementById('scanner-ui');
            const btn = document.getElementById('btn-scan');
            if(ui.classList.contains('hidden')) {
                try {
                    scanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    const video = document.getElementById('qr-video');
                    video.srcObject = scanStream;
                    await video.play();
                    ui.classList.remove('hidden');
                    btn.innerHTML = '<i class="fas fa-times mr-1"></i> Matikan';
                    startBarcodeDetection();
                } catch (e) { showToast("Izin kamera diperlukan", false); }
            } else { stopScanner(); }
        }
        
        function stopScanner() {
            if(scanStream) scanStream.getTracks().forEach(t => t.stop());
            document.getElementById('scanner-ui').classList.add('hidden');
            document.getElementById('btn-scan').innerHTML = '<i class="fas fa-camera-retro mr-1"></i> Aktifkan';
            document.getElementById('manual-resi-input').value = '';
        }
        
        function searchManualResi() {
            const manualResi = document.getElementById('manual-resi-input').value.trim();
            if(!manualResi) {
                showToast("Masukkan nomor resi", false);
                return;
            }
            const item = deliveries.find(d => d.awb === manualResi);
            if(!item) {
                showToast(`Resi ${manualResi} tidak ditemukan`, false);
                return;
            }
            if(item.status === 'TERKIRIM') {
                showToast(`Resi ${manualResi} sudah terkirim`, false);
                return;
            }
            playBeep();
            showToast(`📦 Ditemukan: ${item.name}`, true);
            stopScanner();
            startDeliveryCloud(manualResi);
        }
        
        function startBarcodeDetection() {
            const video = document.getElementById('qr-video');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            let detecting = true;
            
            async function scanFrame() {
                if (!detecting || !video.videoWidth) { requestAnimationFrame(scanFrame); return; }
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                if (window.BarcodeDetector) {
                    const barcodeDetector = new BarcodeDetector({ formats: ['code_128', 'ean_13', 'ean_8', 'qr_code', 'code_39'] });
                    try {
                        const barcodes = await barcodeDetector.detect(imageData);
                        if (barcodes.length > 0) {
                            const awb = barcodes[0].rawValue;
                            if (awb && awb.match(/\d/)) {
                                detecting = false;
                                processScannedAWB(awb);
                                setTimeout(() => { detecting = true; }, 2000);
                            }
                        }
                    } catch(e) {}
                }
                requestAnimationFrame(scanFrame);
            }
            requestAnimationFrame(scanFrame);
        }
        
        async function processScannedAWB(awb) {
            stopScanner();
            const item = deliveries.find(x => x.awb === awb);
            if(!item) { showToast(`Resi ${awb} tidak ditemukan`, false); toggleScanner(); return; }
            if(item.status === 'TERKIRIM') { showToast(`✅ Resi ${awb} sudah terkirim`, false); toggleScanner(); return; }
            playBeep();
            showToast(`📦 Scan: ${item.name}`, true);
            startDeliveryCloud(awb);
        }

        function playBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 880;
                gain.gain.value = 0.3;
                osc.type = 'sine';
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.4);
                osc.stop(audioCtx.currentTime + 0.4);
            } catch(e) {}
        }

        async function startDeliveryCloud(awb) {
            const item = deliveries.find(d => d.awb === awb);
            if(!item) return;
            currentScanningAwb = awb;
            document.getElementById('modal-camera').classList.remove('hidden');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('photo-video').srcObject = stream;
            window.photoStream = stream;
        }

        function closeCameraModal() {
            if(window.photoStream) window.photoStream.getTracks().forEach(t => t.stop());
            document.getElementById('modal-camera').classList.add('hidden');
        }

        async function takeSnapshotCloud() {
            showLoading(true);
            const video = document.getElementById('photo-video');
            const canvas = document.getElementById('canvas-photo');
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const item = deliveries.find(x => x.awb === currentScanningAwb);
            const now = new Date();
            const formattedDateTime = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            ctx.font = "bold 26px 'Inter'";
            ctx.shadowBlur = 0;
            const gradient = ctx.createLinearGradient(0, canvas.height-100, 0, canvas.height);
            gradient.addColorStop(0, 'rgba(0,0,0,0.7)');
            gradient.addColorStop(1, 'rgba(0,0,0,0.95)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, canvas.height-100, canvas.width, 100);
            ctx.fillStyle = "#FFFFFF";
            ctx.font = "bold 20px 'Inter'";
            ctx.fillText(`📦 ${item.awb} | ${item.name}`, 20, canvas.height-60);
            ctx.font = "18px 'Inter'";
            ctx.fillText(`🕒 ${formattedDateTime}`, 20, canvas.height-25);
            
            const base64 = canvas.toDataURL('image/jpeg', 0.85);
            
            await dbRef.child(currentScanningAwb).update({
                status: 'TERKIRIM',
                photo: base64,
                timestamp: formattedDateTime
            });
            
            playBeep();
            showLoading(false);
            closeCameraModal();
            showToast(`✅ ${item.name} - Delivery selesai`, true);
        }

        function showPage(page) {
            if(page === 'input') {
                document.getElementById('password-screen').classList.remove('hidden');
                document.getElementById('input-content').classList.add('hidden');
                document.getElementById('access-password').value = '';
            }
            document.getElementById('page-dashboard').classList.toggle('hidden', page !== 'dashboard');
            document.getElementById('page-input').classList.toggle('hidden', page !== 'input');
            document.getElementById('nav-dashboard').classList.toggle('active', page === 'dashboard');
            document.getElementById('nav-input').classList.toggle('active', page === 'input');
            if(page !== 'dashboard') stopScanner();
        }
    </script>
</body>
</html>
